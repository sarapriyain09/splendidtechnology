name: Avatar Studio Frontend CI

on:
  pull_request:
    paths:
      - "apps/media/modules/avatar-studio/frontend/**"
      - ".github/workflows/avatar-studio-frontend-ci.yml"
  workflow_dispatch:

jobs:
  replay-ui-smoke:
    name: Replay UI Smoke
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/media/modules/avatar-studio/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/media/modules/avatar-studio/frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run replay smoke check
        run: npm run smoke:replay-ui
