name: Product Intelligence AI CI

on:
  pull_request:
    paths:
      - "apps/product-intelligence-ai/**"
      - ".github/workflows/product-intelligence-ai-ci.yml"
  workflow_dispatch:

jobs:
  backend-tests:
    name: Backend Pytest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/product-intelligence-ai/backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run backend tests
        run: python -m pytest -q

  frontend-e2e:
    name: Frontend Playwright E2E
    runs-on: ubuntu-latest
    needs: backend-tests
    defaults:
      run:
        working-directory: apps/product-intelligence-ai/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/product-intelligence-ai/frontend/package-lock.json

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r ../backend/requirements.txt

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        env:
          CI: "true"
          PYTHON_EXECUTABLE: python3
        run: npm run test:e2e